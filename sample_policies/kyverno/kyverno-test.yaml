apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-labels-test

policies:
  - require-labels.yaml
  - add-team-label.yaml


resources:
  - resources.yaml
results:
  - policy: require-labels
    rule: check-for-labels
    resources:
      - good-pod
    kind: Pod
    result: pass
  - policy: require-labels
    rule: check-for-labels
    resources:
      - bad-pod-no-labels
    kind: Pod
    result: fail
  - policy: require-labels
    rule: check-for-labels
    resources:
      - bad-pod-missing-env
    kind: Pod
    result: fail
  # 🔧 mutate test
  - policy: add-team-label
    rule: add-label
    resources:
      - mypod
    kind: Pod
    result: pass
    generatedResource: pod-mutated.yaml
